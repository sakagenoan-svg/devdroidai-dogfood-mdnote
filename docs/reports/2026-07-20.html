<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>devdroidai-dogfood-mdnote 週次レポート</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --green: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    max-width: 840px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; }
  h1 { color: var(--accent); font-size: 24px; margin: 0 0 4px; }
  .period { color: var(--muted); font-size: 13px; }
  h2 { color: var(--green); font-size: 16px; margin: 24px 0 8px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
  }
  .card .label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .card .value { font-size: 24px; font-weight: 700; margin-top: 4px; color: var(--text); }
  .card .value.accent { color: var(--accent); }
  .card .value.green { color: var(--green); }
  .bar-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    height: 20px;
    margin-top: 6px;
  }
  .bar-fill {
    background: var(--green);
    height: 100%;
    border-radius: 4px 0 0 4px;
  }
  .bar-caption { font-size: 11px; color: var(--muted); margin-top: 4px; }
  table.changes {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  table.changes th, table.changes td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  table.changes thead th {
    background: #1c2128;
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  table.changes tr:last-child td { border-bottom: none; }
  table.changes .cat { color: var(--accent); font-weight: 600; white-space: nowrap; width: 30%; }
  ul.inline { margin: 0; padding-left: 16px; }
  ul.bullet { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px 12px 30px; }
  ul.bullet li { margin: 4px 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
  }
  .muted { color: var(--muted); font-style: italic; }
  @media (max-width: 520px) {
    .cards { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .card { padding: 10px 6px; }
    .card .value { font-size: 18px; }
    table.changes .cat { width: 34%; }
  }
</style>
</head>
<body>
  <header>
    <h1>devdroidai-dogfood-mdnote 週次レポート</h1>
    <div class="period">2026-07-13 〜 2026-07-20</div>
  </header>

  <div class="cards">
    <div class="card">
      <div class="label">COMMITS</div>
      <div class="value accent">0</div>
    </div>
    <div class="card">
      <div class="label">BUILD SUCCESS</div>
      <div class="value green">0%</div>
    </div>
    <div class="card">
      <div class="label">BUILDS</div>
      <div class="value">0</div>
    </div>
  </div>

  <h2>ビルド成功率</h2>
  <div class="bar-wrap"><div class="bar-fill" style="width:0%"></div></div>
  <div class="bar-caption">0% (0 回実行)</div>

  <h2>変更内容</h2>
  <table class="changes"><thead><tr><th>カテゴリ</th><th>内容</th></tr></thead><tbody><tr><td class="cat">その他</td><td><ul class="inline"></ul></td></tr></tbody></table>

  <h2>ハイライト</h2>
  <ul class="bullet"><li>報告期間中のコミット活動がありません</li></ul>

  <h2>改善提案</h2>
  <ul class="bullet"><li>プロジェクトの開発再開を検討してください</li><li>定期的なコミット活動の確立を推奨します</li><li>CI/CDパイプラインの実行確認を行ってください</li></ul>

  <h2>コントリビューター</h2>
  <p class="muted">なし</p>
</body>
</html>
